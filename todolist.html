<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .completed { text-decoration: line-through; color: gray; }
        .task-item { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow border-0 rounded-3 p-4">
        <h2 class="text-center mb-4 text-primary">My Task Dashboard</h2>
        
        <div class="input-group mb-4">
            <input type="text" id="taskInput" class="form-control form-control-lg" placeholder="What needs to be done?">
            <button class="btn btn-primary btn-lg" id="addBtn" onclick="addTask()">Add Task</button>
        </div>

        <ul id="taskList" class="list-group">
            </ul>
    </div>
</div>

<script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');

    // Allow pressing "Enter" to add a task
    taskInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") addTask();
    });

    function addTask() {
        const taskText = taskInput.value.trim();
        
        // Basic Validation
        if (taskText === "") {
            alert("Please enter a task before adding!");
            return;
        }

        // Create List Item
        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between align-items-center task-item mb-2 shadow-sm rounded';
        
        // Add Task Text
        const span = document.createElement('span');
        span.innerText = taskText;
        span.style.cursor = 'pointer';
        span.onclick = function() {
            span.classList.toggle('completed');
        };

        // Create Delete Button
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn btn-danger btn-sm';
        deleteBtn.innerText = 'Delete';
        deleteBtn.onclick = function() {
            taskList.removeChild(li);
        };

        // Append elements
        li.appendChild(span);
        li.appendChild(deleteBtn);
        taskList.appendChild(li);

        // Clear input field
        taskInput.value = "";
    }
</script>
</body>
</html>
